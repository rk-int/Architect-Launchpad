<!-- AI Excellence LaunchPad favicon — Anthropic coral 'A' on dark background -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#0f0f13"/>
  <rect width="32" height="32" rx="8" fill="#C8421A" opacity="0.15"/>
  <!-- Stylised 'A' triangle -->
  <polygon points="16,5 27,27 5,27" fill="none" stroke="#C8421A" stroke-width="2.5" stroke-linejoin="round"/>
  <line x1="10.5" y1="20" x2="21.5" y2="20" stroke="#C8421A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Glow dot at apex -->
  <circle cx="16" cy="5" r="1.5" fill="#D4621A"/>
</svg>
